<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      padding: 1.5rem;
      background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #3d1020 100%);
      color: white;
      font-family: Georgia, serif;
      text-align: center;
    }
    .emoji { font-size: 2.5rem; margin-bottom: 1rem; }
    p { color: #9b8fc0; font-size: 0.85rem; line-height: 1.6; }
    .error { color: #ef4444; }
    #tryAgain {
      margin-top: 1rem;
      padding: 0.4rem 1rem;
      background: rgba(139,92,246,0.3);
      color: #c4b5fd;
      border: 1px solid rgba(139,92,246,0.5);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="emoji" id="emoji">⏳</div>
  <p id="msg">Checking login status...</p>
  <button id="tryAgain">Try Again</button>
  <script src="popup.js"></script>
</body>
</html>
